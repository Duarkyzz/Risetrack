<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Risetrack</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>  

    <header class="navbar">
        <h1 class="logo">RiseTrack</h1>
        <nav>
            <a href="/index" class="btn-secondary">Voltar</a>
            <a href="/login" class="btn-primary">Login</a>
        </nav>
    </header>

    <main class="auth-page">
        <section class="auth-card reveal active">
            <div class="auth-header">
                <h2>Crie sua conta</h2>
                <p>Comece hoje a construir sua melhor versão.</p>
            </div>
            
            <form class="auth-form">
                <div class="input-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" name="name" placeholder="Digite seu nome completo" required />
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu email" required />
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Crie uma senha" required />
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirmar Senha</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirme sua senha" required />
                </div>

                <button type="submit" class="btn-primary auth-btn">Criar Conta</button>

            </form>

            <p class="auth-footer">
                Já possui uma conta?
                <a href="/login">Entrar agora</a>
            </p>
        </section>
    </main>
    </body>
</html>
